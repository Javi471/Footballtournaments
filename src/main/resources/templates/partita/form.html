<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Match')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card" style="max-width:760px">
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/admin/tornei}">Tournaments</a>
            <span>›</span>
            <span>Register Match</span>
        </nav>
        <h2>Register Match</h2>

        <form th:action="@{/admin/partite/nuova}" method="post">

            <div class="form-group">
                <label>Tournament *</label>
                <select name="torneoId" required>
                    <option value="">— Select Tournament —</option>
                    <option th:each="t : ${tornei}" th:value="${t.id}"
                            th:text="${t.nome} + ' (' + ${t.anno} + ')'"></option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Home Team *</label>
                    <select name="squadraHomeId" required>
                        <option value="">— Select —</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Away Team *</label>
                    <select name="squadraAwayId" required>
                        <option value="">— Select —</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Referee *</label>
                <select name="arbitroId" required>
                    <option value="">— Select Referee —</option>
                    <option th:each="a : ${arbitri}" th:value="${a.id}"
                            th:text="${a.nome} + ' ' + ${a.cognome} + ' [' + ${a.codiceArbitrale} + ']'">
                    </option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date &amp; Time *</label>
                    <div style="position:relative">
                        <input type="text" id="dataOraPicker" required
                               placeholder="Select date &amp; time…"
                               style="cursor:pointer;padding-right:38px"/>
                        <!-- hidden field Spring reads -->
                        <input type="hidden" name="dataOra" id="dataOraHidden"/>
                        <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                     font-size:16px;pointer-events:none;color:var(--teal-soft)">📅</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" name="luogo" placeholder="e.g. Municipal Stadium"/>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/tornei}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Register Match</button>
            </div>
        </form>
    </div>
</div>

<script>
flatpickr("#dataOraPicker", {
    enableTime: true,
    dateFormat: "d/m/Y H:i",
    time_24hr: true,
    minuteIncrement: 15,
    disableMobile: true,
    onChange: function(selectedDates) {
        if (selectedDates.length > 0) {
            const d = selectedDates[0];
            const iso = d.getFullYear() + '-'
                + String(d.getMonth()+1).padStart(2,'0') + '-'
                + String(d.getDate()).padStart(2,'0') + 'T'
                + String(d.getHours()).padStart(2,'0') + ':'
                + String(d.getMinutes()).padStart(2,'0');
            document.getElementById('dataOraHidden').value = iso;
        }
    }
});
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
