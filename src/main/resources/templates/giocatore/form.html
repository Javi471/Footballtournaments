<!DOCTYPE html>
<!-- Página: formulario para crear o editar un jugador (solo ADMIN) -->
<!-- URL crear: GET /admin/giocatori/nuevo?squadraId=X  |  URL editar: GET /admin/giocatori/{id}/modifica -->
<!-- squadraId es opcional en la creación: si viene, preselecciona el equipo en el selector -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Player')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card" style="max-width:760px">
        <!-- Migas de pan: Teams › Nombre equipo › "Edit Player" o "New Player" -->
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/admin/squadre}">Teams</a>
            <span>›</span>
            <!-- Enlace al equipo del jugador (si ya tiene equipo asignado) -->
            <!-- Si es jugador nuevo sin equipo previo, el enlace apunta a '#' -->
            <a th:href="${giocatore.squadra != null} ? @{/admin/squadre/{id}(id=${giocatore.squadra.id})} : '#'"
               th:text="${giocatore.squadra != null} ? ${giocatore.squadra.nome} : 'Team'"></a>
            <span>›</span>
            <span th:text="${giocatore.id != null} ? 'Edit Player' : 'New Player'"></span>
        </nav>
        <h2 th:text="${giocatore.id != null} ? 'Edit Player' : 'New Player'"></h2>

        <!--
            th:action dinámica:
            - Si giocatore.id existe → POST /admin/giocatori/{id}/modifica (actualiza)
            - Si giocatore.id es null → POST /admin/giocatori/nuevo (crea nuevo)

            th:object="${giocatore}": vincula el formulario al objeto Giocatore del modelo
        -->
        <form th:action="${giocatore.id != null} ? @{/admin/giocatori/{id}/modifica(id=${giocatore.id})} : @{/admin/giocatori/nuovo}"
              th:object="${giocatore}" method="post">

            <!-- Nombre y apellido en dos columnas -->
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" th:field="*{nome}" required placeholder="e.g. Marco"/>
                    <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" th:field="*{cognome}" required placeholder="e.g. Rossi"/>
                    <span class="error-msg" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
                </div>
            </div>

            <div class="form-row">
                <!-- Fecha de nacimiento con Flatpickr (calendario visual) -->
                <div class="form-group">
                    <label>Date of Birth *</label>
                    <div style="position:relative">
                        <!-- Input visible: el usuario selecciona con el calendario -->
                        <input type="text" id="dataNascitaPicker" required
                               placeholder="Select date…"
                               style="cursor:pointer;padding-right:38px"/>
                        <!-- Campo oculto: th:field="*{dataNascita}" → Spring lo convierte a LocalDate -->
                        <!-- Flatpickr escribe la fecha ISO (yyyy-MM-dd) aquí cuando el usuario elige -->
                        <input type="hidden" th:field="*{dataNascita}" id="dataNascitaHidden"/>
                        <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                     font-size:16px;pointer-events:none;color:var(--teal-soft)">📅</span>
                    </div>
                    <span class="error-msg" th:if="${#fields.hasErrors('dataNascita')}"
                          th:errors="*{dataNascita}"></span>
                </div>

                <!-- Altura con botones +/- (stepper personalizado) -->
                <div class="form-group">
                    <label>Height (cm)</label>
                    <div class="num-stepper">
                        <!-- Los botones type="button" no envían el formulario (evitan submit accidental) -->
                        <button type="button" class="stepper-btn" onclick="stepHeight(-1)">−</button>
                        <input type="number" th:field="*{altezza}" id="altezzaInput"
                               min="140" max="220" placeholder="178"/>
                        <button type="button" class="stepper-btn" onclick="stepHeight(1)">+</button>
                    </div>
                </div>
            </div>

            <!-- Posición del jugador: los valores en italiano coinciden con los guardados en BD -->
            <!-- El badge en dettaglio.html los traduce al inglés para mostrar -->
            <div class="form-group">
                <label>Position *</label>
                <select th:field="*{ruolo}" required>
                    <option value="">— Select position —</option>
                    <!-- Los values son en italiano (como están en la BD y en el modelo) -->
                    <option value="Portiere">Goalkeeper</option>
                    <option value="Difensore">Defender</option>
                    <option value="Centrocampista">Midfielder</option>
                    <option value="Attaccante">Forward</option>
                </select>
                <span class="error-msg" th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}"></span>
            </div>

            <!-- Selector de equipo: muestra todos los equipos de la BD -->
            <!-- No usa th:field porque el controller recibe squadraId como @RequestParam separado -->
            <!-- (JPA no puede vincular directamente una relación @ManyToOne con th:field) -->
            <div class="form-group">
                <label>Team *</label>
                <select name="squadraId" required>
                    <option value="">— Select team —</option>
                    <!-- th:each="s : ${squadre}": itera todos los equipos disponibles -->
                    <option th:each="s : ${squadre}"
                            th:value="${s.id}"
                            th:text="${s.nome} + ' (' + ${s.citta} + ')'"
                            <!-- th:selected: marca como seleccionado el equipo actual del jugador -->
                            <!-- Compara giocatore.squadra.id con el id del equipo de la iteración -->
                            th:selected="${giocatore.squadra != null and giocatore.squadra.id == s.id}">
                    </option>
                </select>
            </div>

            <!-- Botones: Cancelar (vuelve al equipo del jugador) y Guardar -->
            <div class="form-actions">
                <!-- Cancelar: vuelve al detalle del equipo si tiene uno, si no a la lista de equipos -->
                <a th:href="${giocatore.squadra != null} ? @{/admin/squadre/{id}(id=${giocatore.squadra.id})} : @{/admin/squadre}"
                   class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Player</button>
            </div>
        </form>
    </div>
</div>

<!-- th:inline="javascript": permite que Thymeleaf inyecte valores del servidor en el JS -->
<script th:inline="javascript">
// ── Flatpickr — selector de fecha de nacimiento ──────────────────────
// /*[[${giocatore.dataNascita}]]*/ null: Thymeleaf sustituye por la fecha actual del jugador
// Si es un jugador nuevo, el valor será null y Flatpickr no pre-seleccionará ninguna fecha
const existingDate = /*[[${giocatore.dataNascita}]]*/ null;
flatpickr("#dataNascitaPicker", {
    dateFormat: "d/m/Y",    // formato visual para el usuario (ej: 14/06/1998)
    maxDate: "today",       // no permite fechas futuras (un jugador no puede nacer mañana)
    defaultDate: existingDate || null, // si hay fecha guardada, la pre-selecciona
    disableMobile: true,    // siempre usa Flatpickr, no el picker nativo del móvil
    onChange: function(selectedDates, dateStr, instance) {
        if (selectedDates.length > 0) {
            const d = selectedDates[0];
            // Construye la fecha en formato ISO "yyyy-MM-dd" que Spring/JPA entiende como LocalDate
            const iso = d.getFullYear() + '-'
                + String(d.getMonth()+1).padStart(2,'0') + '-'
                + String(d.getDate()).padStart(2,'0');
            // Escribe el valor ISO en el campo oculto vinculado a giocatore.dataNascita
            document.getElementById('dataNascitaHidden').value = iso;
        }
    }
});

// ── Stepper de altura — botones +/- para el campo numérico ───────────
function stepHeight(delta) {
    const inp = document.getElementById('altezzaInput');
    let val = parseInt(inp.value) || 170; // si está vacío, empieza desde 170
    val = Math.min(220, Math.max(140, val + delta)); // limita entre 140 y 220 cm
    inp.value = val;
}
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
