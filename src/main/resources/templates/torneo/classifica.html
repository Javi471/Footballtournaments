<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Classifica ' + ${torneo.nome})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <div>
            <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-outline btn-sm">← Torneo</a>
            <h1>Classifica — <span th:text="${torneo.nome}"></span></h1>
        </div>
    </div>

    <div class="alert alert-info" style="margin-bottom:1.5rem;">
        ⚽ La classifica è gestita da React.
        Assicurati che il frontend sia in esecuzione su
        <strong>http://localhost:5173</strong>
        (<code>cd frontend &amp;&amp; npm run dev</code>)
    </div>

    <!-- Redirige a la app React pasando el torneoId en la URL -->
    <script th:inline="javascript">
        const torneoId = /*[[${torneo.id}]]*/ null;
        window.location.href = `http://localhost:5173/classifica/${torneoId}`;
    </script>

    <noscript>
        <p class="alert alert-error">
            JavaScript es necesario. Accede directamente a
            <a th:href="'http://localhost:5173/classifica/' + ${torneo.id}">
                http://localhost:5173/classifica/<span th:text="${torneo.id}"></span>
            </a>
        </p>
    </noscript>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
