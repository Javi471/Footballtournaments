<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Standings — ' + ${torneo.nome})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- ── Hero ────────────────────────────────────────────────────────── -->
<div class="detail-hero">
    <svg class="stripe-svg" viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,220 500,0 1440,0 1440,220" fill="rgba(43,183,168,.07)"/>
        <polygon points="0,220 900,80 1440,150 1440,220" fill="rgba(43,183,168,.04)"/>
    </svg>
    <div class="inner">
        <nav class="breadcrumb">
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/tornei}">Tournaments</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/tornei}">Tournaments</a>
            <span>›</span>
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/tornei/{id}(id=${torneo.id})}" th:text="${torneo.nome}"></a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/tornei/{id}(id=${torneo.id})}" th:text="${torneo.nome}"></a>
            <span>›</span>
            <span>Standings</span>
        </nav>
        <div class="page-header" style="margin-bottom:0">
            <div class="page-header-left">
                <span class="eyebrow" th:text="'Season ' + ${torneo.anno}"></span>
                <h1 class="page-title">🏆 Standings</h1>
                <p style="color:var(--muted);font-size:14px;margin-top:8px" th:text="${torneo.nome}"></p>
            </div>
        </div>
    </div>
</div>

<div class="page-wrapper">

    <!-- ── Standings table (React) ──────────────────────────────────── -->
    <div class="section">
        <div class="section-header">
            <h2 class="section-title">League Table</h2>
        </div>

        <!--
            React monta la tabla de clasificacion dentro de este div.
            data-torneo-id lo lee classifica.js para saber que torneo cargar.
            classifica.js llama a /api/tornei/{id}/classifica y dibuja la tabla.
        -->
        <div id="classifica-root" th:attr="data-torneo-id=${torneo.id}"></div>
    </div>

    <!-- Script compilado de classifica.jsx por Vite — genera la tabla con React -->
    <script th:src="@{/react/classifica.js}"></script>


</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
