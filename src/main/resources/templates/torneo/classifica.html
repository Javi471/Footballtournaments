<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Classifica')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper" style="max-width:600px;text-align:center;padding-top:80px">
    <div style="font-size:48px;margin-bottom:16px">🏆</div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;margin-bottom:8px">
        Caricamento Classifica...
    </h2>
    <p style="color:var(--muted);margin-bottom:24px">
        Redirect verso il frontend React in corso...
    </p>
    <div class="alert alert-info">
        La classifica è gestita da React. Assicurati che il frontend sia in esecuzione:
        <code style="display:block;margin-top:8px;color:var(--teal-soft)">cd frontend &amp;&amp; npm run dev</code>
    </div>
    <noscript>
        <div class="alert alert-error" style="margin-top:16px">
            JavaScript è necessario. Accedi direttamente a
            <a th:href="'http://localhost:5173/classifica/' + ${torneo.id}">
                http://localhost:5173/classifica/<span th:text="${torneo.id}"></span>
            </a>
        </div>
    </noscript>
</div>

<script th:inline="javascript">
    const torneoId = /*[[${torneo.id}]]*/ null;
    window.location.href = `http://localhost:5173/classifica/${torneoId}`;
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
