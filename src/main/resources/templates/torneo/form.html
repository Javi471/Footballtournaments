<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Torneo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card">
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/tornei}">Tornei</a>
            <span>›</span>
            <span th:text="${torneo.id != null} ? 'Modifica Torneo' : 'Nuovo Torneo'"></span>
        </nav>
        <h2 th:text="${torneo.id != null} ? 'Modifica Torneo' : 'Nuovo Torneo'"></h2>

        <form th:action="${torneo.id != null} ? @{/tornei/{id}/modifica(id=${torneo.id})} : @{/tornei/nuovo}"
              th:object="${torneo}" method="post">

            <div class="form-group">
                <label>Nome *</label>
                <input type="text" th:field="*{nome}" required placeholder="Es. Torneo Primavera 2026"/>
                <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>Anno *</label>
                <input type="number" th:field="*{anno}" required min="2000" max="2100" placeholder="2026"/>
                <span class="error-msg" th:if="${#fields.hasErrors('anno')}" th:errors="*{anno}"></span>
            </div>

            <div class="form-group">
                <label>Descrizione</label>
                <textarea th:field="*{descrizione}" rows="4"
                          placeholder="Descrizione del torneo, regole, premi..."></textarea>
            </div>

            <div class="form-group">
                <label>Squadre Partecipanti</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item" th:each="s : ${tutteLeSquadre}">
                        <input type="checkbox" name="squadraIds" th:value="${s.id}"
                               th:checked="${torneo.squadre != null and #lists.contains(torneo.squadre.![id], s.id)}"/>
                        <span th:text="${s.nome} + ' (' + ${s.citta} + ')'"></span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/tornei}" class="btn btn-ghost">Annulla</a>
                <button type="submit" class="btn btn-primary">Salva Torneo</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
