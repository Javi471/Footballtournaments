<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper" style="max-width:480px;margin-top:60px">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:28px">
            <span class="eyebrow">Benvenuto</span>
            <h2 style="margin-top:8px">Accedi</h2>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            Username o password errati.
        </div>
        <div th:if="${param.registered}" class="alert alert-success">
            Registrazione completata! Ora puoi accedere.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus placeholder="Il tuo username"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••"/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Accedi</button>
        </form>
        <p class="form-footer">Non hai un account? <a th:href="@{/register}">Registrati</a></p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
