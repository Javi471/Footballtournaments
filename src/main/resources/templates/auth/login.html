<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="soccer-anim" aria-hidden="true">
  <div class="soccer-ball-x">
    <div class="soccer-ball-y">
      <svg class="soccer-ball-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="sball" cx="36%" cy="30%" r="66%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="55%" stop-color="#e8e8e8"/>
            <stop offset="100%" stop-color="#aaaaaa"/>
          </radialGradient>
          <clipPath id="sclip"><circle cx="50" cy="50" r="46"/></clipPath>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#sball)"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="50,20 63,30 58,46 42,46 37,30"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="74,12 86,25 81,40 66,38 63,22"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="83,52 90,67 78,78 65,71 64,55"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="63,76 67,91 51,97 37,89 39,74"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="37,74 23,89 8,82 8,65 24,59"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="17,50 9,35 22,24 35,31 36,47"/>
        <polygon clip-path="url(#sclip)" fill="#111" points="26,10 40,8 48,22 37,31 22,26"/>
        <ellipse cx="31" cy="26" rx="11" ry="7" fill="rgba(255,255,255,0.6)" transform="rotate(-30 31 26)"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="#909090" stroke-width="1.2"/>
      </svg>
    </div>
  </div>
</div>

<div class="page-wrapper" style="max-width:480px;margin-top:80px;position:relative;z-index:10">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:28px">
            <span class="eyebrow">Welcome back</span>
            <h2 style="margin-top:8px">Log In</h2>
        </div>
        <div th:if="${param.error}" class="alert alert-error">Incorrect username or password.</div>
        <div th:if="${param.registered}" class="alert alert-success">Registration successful! You can now sign in.</div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus placeholder="Your username"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••"/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Log In</button>
        </form>

        <!-- Separador -->
        <div style="display:flex; align-items:center; gap:12px; margin:20px 0">
            <div style="flex:1; height:1px; background:var(--border)"></div>
            <span style="color:var(--muted); font-size:13px">or</span>
            <div style="flex:1; height:1px; background:var(--border)"></div>
        </div>

        <!-- Botón OAuth GitHub -->
        <a href="/oauth2/authorization/github"
           style="display:flex; align-items:center; justify-content:center; gap:10px;
                  width:100%; padding:11px 0; border-radius:8px;
                  background:#24292e; color:#fff; font-weight:600; font-size:15px;
                  text-decoration:none; border:1px solid #444;
                  transition:background .2s"
           onmouseover="this.style.background='#3a3f45'"
           onmouseout="this.style.background='#24292e'">
            <!-- Icono de GitHub -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58
                         0-.28-.01-1.03-.02-2.03-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76
                         -1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5 1
                         .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22
                         -.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02.005
                         2.04.138 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84
                         1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22
                         0 1.6-.01 2.9-.01 3.29 0 .32.21.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Login with GitHub
        </a>

        <p class="form-footer">Don't have an account? <a th:href="@{/register}">Sign up</a></p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
