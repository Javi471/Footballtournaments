<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registrazione')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper" style="max-width:480px;margin-top:60px">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:28px">
            <span class="eyebrow">Unisciti alla community</span>
            <h2 style="margin-top:8px">Crea Account</h2>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus minlength="3"
                       placeholder="Scegli un username (min. 3 caratteri)"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6"
                       placeholder="Minimo 6 caratteri"/>
                <small>La password deve contenere almeno 6 caratteri</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Registrati</button>
        </form>
        <p class="form-footer">Hai già un account? <a th:href="@{/login}">Accedi</a></p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
