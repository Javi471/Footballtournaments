<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign Up')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper" style="max-width:480px;margin-top:60px">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:28px">
            <span class="eyebrow">Join the community</span>
            <h2 style="margin-top:8px">Create Account</h2>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" id="registerForm">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required minlength="3"
                       placeholder="Choose a username (min. 3 characters)"
                       th:value="${username}"/>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required
                       placeholder="your@email.com"
                       th:value="${email}"/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="passwordInput" required minlength="6"
                       placeholder="Min. 6 characters"
                       oninput="checkPassword(this.value)"/>

                <!-- Password strength checklist -->
                <div id="pwChecks" style="margin-top:10px;display:flex;flex-direction:column;gap:5px">
                    <div id="ck-length" class="pw-check">
                        <span class="pw-icon">✗</span>
                        <span>At least 6 characters</span>
                    </div>
                    <div id="ck-upper" class="pw-check">
                        <span class="pw-icon">✗</span>
                        <span>At least 1 uppercase letter</span>
                    </div>
                    <div id="ck-digit" class="pw-check">
                        <span class="pw-icon">✗</span>
                        <span>At least 1 number</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn"
                    style="width:100%;justify-content:center;margin-top:8px">
                Create Account
            </button>
        </form>
        <p class="form-footer">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </div>
</div>

<style>
.pw-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    transition: color .2s;
}
.pw-check.ok { color: #4ade80; }
.pw-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: rgba(167,176,186,.15);
    border: 1px solid rgba(167,176,186,.3);
    display: grid;
    place-items: center;
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
    transition: background .2s, border-color .2s, color .2s;
}
.pw-check.ok .pw-icon {
    background: rgba(34,197,94,.15);
    border-color: rgba(34,197,94,.4);
    color: #4ade80;
}
</style>

<script>
function checkPassword(val) {
    const hasLength = val.length >= 6;
    const hasUpper  = /[A-Z]/.test(val);
    const hasDigit  = /[0-9]/.test(val);

    setCheck('ck-length', hasLength);
    setCheck('ck-upper',  hasUpper);
    setCheck('ck-digit',  hasDigit);

    const allOk = hasLength && hasUpper && hasDigit;
    document.getElementById('submitBtn').style.opacity = allOk ? '1' : '0.5';
}

function setCheck(id, ok) {
    const el   = document.getElementById(id);
    const icon = el.querySelector('.pw-icon');
    if (ok) {
        el.classList.add('ok');
        icon.textContent = '✓';
    } else {
        el.classList.remove('ok');
        icon.textContent = '✗';
    }
}

// Init state
document.getElementById('submitBtn').style.opacity = '0.5';
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
