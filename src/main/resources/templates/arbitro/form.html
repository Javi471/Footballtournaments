<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Referee')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card">
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/admin/arbitri}">Referees</a>
            <span>›</span>
            <span th:text="${arbitro.id != null} ? 'Edit Referee' : 'New Referee'"></span>
        </nav>
        <h2 th:text="${arbitro.id != null} ? 'Edit Referee' : 'New Referee'"></h2>

        <form th:action="${arbitro.id != null} ? @{/admin/arbitri/{id}/modifica(id=${arbitro.id})} : @{/admin/arbitri/nuovo}"
              th:object="${arbitro}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" th:field="*{nome}" required placeholder="e.g. Luca"/>
                    <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" th:field="*{cognome}" required placeholder="e.g. Bianchi"/>
                    <span class="error-msg" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Referee Code *</label>
                <input type="text" th:field="*{codiceArbitrale}" required placeholder="e.g. ARB-001"/>
                <span class="error-msg" th:if="${#fields.hasErrors('codiceArbitrale')}"
                      th:errors="*{codiceArbitrale}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/arbitri}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Referee</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
