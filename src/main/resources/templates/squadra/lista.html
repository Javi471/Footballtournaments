<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Teams')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="hero-stripe">
    <svg class="stripe-svg" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,200 400,0 1440,0 1440,200" fill="rgba(43,183,168,.06)"/>
        <polygon points="0,200 700,60 1440,120 1440,200" fill="rgba(43,183,168,.03)"/>
    </svg>
    <div class="hero-inner">
        <div class="page-header">
            <div class="page-header-left">
                <span class="eyebrow">👕 Squads &amp; Players</span>
                <h1 class="page-title">Teams</h1>
                <p class="page-subtitle"
                   th:text="${page.totalElements} + ' teams registered'"></p>
            </div>
            <a th:href="@{/admin/squadre/nuova}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary">
                + New Team
            </a>
        </div>
    </div>
</div>

<div class="page-wrapper">
    <div th:if="${page.totalElements == 0}" class="empty-state">
        <div class="empty-icon">👕</div>
        <p>No teams registered yet.</p>
    </div>

    <div class="card-grid">
        <div class="card" th:each="s : ${page.content}">
            <div class="card-accent-bar"></div>
            <div class="card-body" style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px">
                <div>
                    <div class="card-meta" th:text="${s.citta}"></div>
                    <h3 class="card-title" th:text="${s.nome}"></h3>
                    <p class="card-text">
                        Founded in <strong style="color:#fff" th:text="${s.annoFondazione}"></strong>
                    </p>
                </div>
                <!-- Imagen del equipo (si existe) -->
                <img th:if="${s.imagePath != null}"
                     th:src="${s.imagePath}"
                     alt="Logo"
                     style="width:64px; height:64px; object-fit:cover;
                            border-radius:10px; border:2px solid var(--teal-soft);
                            flex-shrink:0"/>
            </div>
            <div class="card-footer">
                <a sec:authorize="!hasRole('ADMIN')" th:href="@{/squadre/{id}(id=${s.id})}" class="btn btn-primary btn-sm">Squad</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/squadre/{id}(id=${s.id})}" class="btn btn-primary btn-sm">Squad</a>
                <div sec:authorize="hasRole('ADMIN')" style="display:flex;gap:6px;margin-left:auto;flex-wrap:wrap">
                    <a th:href="@{/admin/squadre/{id}/modifica(id=${s.id})}" class="btn btn-ghost btn-sm">Edit</a>
                    <form th:action="@{/admin/squadre/{id}/elimina(id=${s.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Delete this team?')">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" th:if="${page.totalPages > 1}">
        <!-- Prev -->
        <a th:if="${!page.first}"
           th:href="${baseUrl + '?page=' + (page.number - 1)}"
           class="page-btn" title="Previous">‹</a>
        <span th:if="${page.first}" class="page-btn disabled">‹</span>

        <!-- Page numbers -->
        <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
            <a th:if="${i != page.number}"
               th:href="${baseUrl + '?page=' + i}"
               th:text="${i + 1}"
               class="page-btn"></a>
            <span th:if="${i == page.number}"
                  th:text="${i + 1}"
                  class="page-btn active"></span>
        </th:block>

        <!-- Next -->
        <a th:if="${!page.last}"
           th:href="${baseUrl + '?page=' + (page.number + 1)}"
           class="page-btn" title="Next">›</a>
        <span th:if="${page.last}" class="page-btn disabled">›</span>
    </div>
    <!-- Page info -->
    <p class="pagination-info" th:if="${page.totalPages > 1}"
       th:text="'Page ' + (${page.number + 1}) + ' of ' + ${page.totalPages}"></p>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
