<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${squadra.nome})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Detail hero -->
<div class="detail-hero">
    <svg class="stripe-svg" viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,220 500,0 1440,0 1440,220" fill="rgba(43,183,168,.07)"/>
        <polygon points="0,220 900,80 1440,150 1440,220" fill="rgba(43,183,168,.04)"/>
    </svg>
    <div class="inner">
        <nav class="breadcrumb">
            <a th:href="@{/squadre}">Squadre</a>
            <span>›</span>
            <span th:text="${squadra.nome}"></span>
        </nav>
        <div class="page-header" style="margin-bottom:0">
            <div class="page-header-left">
                <span class="eyebrow" th:text="${squadra.citta}"></span>
                <h1 class="page-title" th:text="${squadra.nome}"></h1>
                <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
                    <span class="badge badge-teal" th:text="'Fondata: ' + ${squadra.annoFondazione}"></span>
                    <span class="badge badge-gray"
                          th:text="${#lists.size(squadra.giocatori)} + ' giocatori'"></span>
                </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start"
                 sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/squadre/{id}/modifica(id=${squadra.id})}" class="btn btn-ghost btn-sm">
                    Modifica Squadra
                </a>
                <a th:href="@{/giocatori/nuovo(squadraId=${squadra.id})}" class="btn btn-primary btn-sm">
                    + Giocatore
                </a>
            </div>
        </div>
    </div>
</div>

<div class="page-wrapper">
    <div class="section">
        <div class="section-header">
            <h2 class="section-title">Rosa Giocatori</h2>
        </div>
        <div th:if="${#lists.isEmpty(squadra.giocatori)}" class="empty-state">
            <div class="empty-icon">👤</div>
            <p>Nessun giocatore registrato in questa squadra.</p>
        </div>
        <div class="table-wrap" th:unless="${#lists.isEmpty(squadra.giocatori)}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Cognome</th>
                        <th>Ruolo</th>
                        <th>Data Nascita</th>
                        <th class="center">Altezza (cm)</th>
                        <th sec:authorize="hasRole('ADMIN')"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="g : ${squadra.giocatori}">
                        <td th:text="${g.nome}"></td>
                        <td th:text="${g.cognome}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${g.ruolo == 'Portiere'} ? ' badge-teal' : (${g.ruolo == 'Attaccante'} ? ' badge-red' : ' badge-gray')"
                                  th:text="${g.ruolo}"></span>
                        </td>
                        <td th:text="${#temporals.format(g.dataNascita, 'dd/MM/yyyy')}"></td>
                        <td class="center" th:text="${g.altezza != null} ? ${g.altezza} + ' cm' : '—'"></td>
                        <td sec:authorize="hasRole('ADMIN')" style="white-space:nowrap">
                            <a th:href="@{/giocatori/{id}/modifica(id=${g.id})}" class="btn btn-ghost btn-sm">
                                Modifica
                            </a>
                            <form th:action="@{/giocatori/{id}/elimina(id=${g.id})}" method="post"
                                  style="display:inline" onsubmit="return confirm('Eliminare questo giocatore?')">
                                <button type="submit" class="btn btn-danger btn-sm">✕</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
