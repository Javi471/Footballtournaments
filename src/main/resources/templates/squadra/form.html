<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Squadra')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card">
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/squadre}">Squadre</a>
            <span>›</span>
            <span th:text="${squadra.id != null} ? 'Modifica Squadra' : 'Nuova Squadra'"></span>
        </nav>
        <h2 th:text="${squadra.id != null} ? 'Modifica Squadra' : 'Nuova Squadra'"></h2>

        <form th:action="${squadra.id != null} ? @{/squadre/{id}/modifica(id=${squadra.id})} : @{/squadre/nuova}"
              th:object="${squadra}" method="post">

            <div class="form-group">
                <label>Nome *</label>
                <input type="text" th:field="*{nome}" required placeholder="Es. FC Atletico Roma"/>
                <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>Città *</label>
                <input type="text" th:field="*{citta}" required placeholder="Es. Roma"/>
                <span class="error-msg" th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}"></span>
            </div>

            <div class="form-group">
                <label>Anno di Fondazione *</label>
                <input type="number" th:field="*{annoFondazione}" required min="1800" max="2026"
                       placeholder="Es. 1990"/>
                <span class="error-msg" th:if="${#fields.hasErrors('annoFondazione')}"
                      th:errors="*{annoFondazione}"></span>
            </div>

            <div class="form-actions">
                <a th:href="@{/squadre}" class="btn btn-ghost">Annulla</a>
                <button type="submit" class="btn btn-primary">Salva Squadra</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
