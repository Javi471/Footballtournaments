<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Team')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper">
    <div class="form-card">
        <nav class="breadcrumb" style="margin-bottom:20px">
            <a th:href="@{/admin/squadre}">Teams</a>
            <span>›</span>
            <span th:text="${squadra.id != null} ? 'Edit Team' : 'New Team'"></span>
        </nav>
        <h2 th:text="${squadra.id != null} ? 'Edit Team' : 'New Team'"></h2>

        <form th:action="${squadra.id != null} ? @{/admin/squadre/{id}/modifica(id=${squadra.id})} : @{/admin/squadre/nuova}"
              th:object="${squadra}" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label>Name *</label>
                <input type="text" th:field="*{nome}" required placeholder="e.g. FC Atletico Roma"/>
                <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>City *</label>
                <input type="text" th:field="*{citta}" required placeholder="e.g. Rome"/>
                <span class="error-msg" th:if="${#fields.hasErrors('citta')}" th:errors="*{citta}"></span>
            </div>

            <div class="form-group">
                <label>Founded Year *</label>
                <input type="number" th:field="*{annoFondazione}" required min="1800" max="2026"
                       placeholder="e.g. 1990"/>
                <span class="error-msg" th:if="${#fields.hasErrors('annoFondazione')}"
                      th:errors="*{annoFondazione}"></span>
            </div>

            <!-- Campo para subir la imagen del equipo -->
            <div class="form-group">
                <label>Team Logo / Image</label>

                <!-- Si ya tiene imagen, la mostramos como previsualización -->
                <div th:if="${squadra.imagePath != null}" style="margin-bottom:10px">
                    <img th:src="${squadra.imagePath}" alt="Imagen actual"
                         style="width:100px; height:100px; object-fit:cover;
                                border-radius:8px; border:2px solid var(--teal-soft)"/>
                    <p style="font-size:12px; color:var(--muted); margin-top:4px">
                        Imagen actual. Sube una nueva para reemplazarla.
                    </p>
                </div>

                <!-- Input de archivo -->
                <input type="file" name="immagine" accept="image/*"
                       style="color:var(--text); background:var(--card);
                              border:1px solid var(--border); border-radius:6px;
                              padding:8px; width:100%"/>
                <p style="font-size:12px; color:var(--muted); margin-top:4px">
                    Formatos aceptados: JPG, PNG, GIF. Máximo 10MB.
                </p>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/squadre}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Team</button>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
