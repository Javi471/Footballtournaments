# Este archivo solo se usa cuando se ejecutan los tests automaticos (archivos *Test.java)
# Spring lo detecta por el nombre "application-test" y lo usa en lugar de application.properties
# Asi los tests no tocan la base de datos real de PostgreSQL

# Base de datos H2 en memoria RAM (no en disco duro)
# mem:testdb = se llama testdb y vive en RAM, desaparece al terminar los tests
spring.datasource.url=jdbc:h2:mem:testdb

# Driver de H2 (en application.properties usabamos el de PostgreSQL)
spring.datasource.driver-class-name=org.h2.Driver

# Usuario y contrasena por defecto de H2 (sa = System Administrator, sin contrasena)
spring.datasource.username=sa
spring.datasource.password=

# create-drop = crea las tablas al empezar el test y las borra al terminar
# Asi cada test empieza desde cero sin datos de tests anteriores
# En application.properties usamos "update" para no borrar datos reales
spring.jpa.hibernate.ddl-auto=create-drop

# Dialecto de H2 para que Hibernate genere SQL compatible con H2 y no con PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
